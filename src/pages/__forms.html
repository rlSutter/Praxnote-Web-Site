<!doctype html>
<html>
<head><title>Netlify form detection (not user-facing)</title><meta name="robots" content="noindex,nofollow" /></head>
<body>

<form name="demo-request" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="practice" />
  <input type="text" name="role" />
  <input type="text" name="clinicians" />
  <input type="text" name="region" />
  <textarea name="message"></textarea>
  <input type="checkbox" name="consent" />
</form>

<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="topic" />
  <textarea name="message"></textarea>
</form>

<form name="baa-request" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="practice" />
  <input type="text" name="role" />
  <input type="text" name="jurisdiction" />
  <textarea name="message"></textarea>
</form>

</body>
</html>
